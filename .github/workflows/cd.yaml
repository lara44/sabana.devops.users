name: sabana.devops.users .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Java (requerido por SonarScanner)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install SonarCloud scanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Restore dependencies
      run: dotnet restore sabana.devops.users.sln

    # ── SONAR: Begin ──────────────────────────────
    - name: SonarCloud - Begin analysis
      run: |
        dotnet sonarscanner begin \
          /k:"lara44_sabana.devops.users" \
          /o:"lara44" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.scanner.skipJreProvisioning=true

    - name: Build
      run: dotnet build sabana.devops.users.sln --no-restore --no-incremental --configuration Release

    - name: Test
      run: dotnet test sabana.devops.users.sln --no-build --verbosity normal --configuration Release

    # ── SONAR: End ────────────────────────────────
    - name: SonarCloud - End analysis
      run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

    # ── SNYK ──────────────────────────────────────
    - name: Snyk - Security scan
      uses: snyk/actions/dotnet@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high --file=sabana.devops.users.sln

    # ── DOCKER ────────────────────────────────────
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/sabana-devops-users:latest