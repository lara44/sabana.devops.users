name: sabana.devops.users .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Setup Java (requerido por SonarScanner)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install SonarCloud scanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Restore dependencies
      run: dotnet restore sabana.devops.users.sln

    # ── SONAR: Begin ──────────────────────────────
    - name: SonarCloud - Begin analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet sonarscanner begin \
          /k:"lara44_sabana.devops.users" \
          /o:"lara44" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.token="$SONAR_TOKEN" \
          /d:sonar.scanner.skipJreProvisioning=true \
          /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"

    - name: Build
      run: dotnet build sabana.devops.users.sln --no-restore --no-incremental --configuration Release

    # ── TEST + COBERTURA ──────────────────────────
    - name: Test
      run: |
        dotnet test sabana.devops.users.sln \
          --no-build \
          --verbosity normal \
          --configuration Release \
          --collect:"XPlat Code Coverage" \
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

    # ── SONAR: End ────────────────────────────────
    - name: SonarCloud - End analysis
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

    # ── SNYK ──────────────────────────────────────
    - name: Snyk - Security scan
      uses: snyk/actions/dotnet@9adf32b1121593767fc3c057af55b55db032dc04
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high --file=sabana.devops.users.sln

    # ── DOCKER ────────────────────────────────────
    - name: Login to Docker Hub
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@db14339dbc0a1f0b184157be94b23a2138122354
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/sabana-devops-users:latest